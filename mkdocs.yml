site_name: Documentation Borne d'Arcade
site_description: Documentation technique de la borne d'arcade et de ses jeux
site_author: Ethann Cailliau

theme:
  name: material
  language: fr
  palette:
    # Mode clair
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Passer au mode sombre
    # Mode sombre
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Passer au mode clair
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.tabs.link
    - content.code.annotation
    - content.code.copy
  icon:
    repo: fontawesome/brands/github

plugins:
  - search:
      lang: fr

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - admonition
  - pymdownx.details
  - pymdownx.tasklist:
      custom_checkbox: true
  - attr_list
  - md_in_html
  - tables

nav:
  - Accueil: index.md
  - Génération de documentation: "outils/generator.md"
  - Guide Utilisateur: UTILISATEUR.md
  - Installation:
      - Vue d'ensemble: installation/overview.md
      - Guide d'installation: INSTALLATION.md
      - Architecture technique: TECHNIQUE.md
  - Jeux:
      - Vue d'ensemble: jeux/index.md
      - Ajouter un jeu: AJOUT_JEU.md
      - ball-blast: jeux/ball-blast.md
      - Columns: jeux/Columns.md
      - CursedWare: jeux/CursedWare.md
      - DinoRail: jeux/DinoRail.md
      - InitialDrift: jeux/InitialDrift.md
      - JavaSpace: jeux/JavaSpace.md
      - Kowasu_Renga: jeux/Kowasu_Renga.md
      - Minesweeper: jeux/Minesweeper.md
      - OsuTile: jeux/OsuTile.md
      - PianoTile: jeux/PianoTile.md
      - Pong: jeux/Pong.md
      - Puissance_X: jeux/Puissance_X.md
      - Snake_Eater: jeux/Snake_Eater.md
      - TronGame: jeux/TronGame.md
  - Outils:
      - Wrapper Ollama: outils/ollama_wrapper.md
      - Générateur: outils/generator.md
      - Tests: outils/tests.md
  - Maintenance:
      - Procédures: maintenance/procedures.md
      - Dépannage: maintenance/troubleshooting.md
  - À propos: about.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com
